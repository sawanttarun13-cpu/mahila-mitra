<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Temporarily Down</title>
    <style>
        :root {
            /* Dark gradient background (dark slate to darker blue) */
            --bg-gradient-start: #1e293b;
            --bg-gradient-end: #020617;
            --text-main: #f8fafc; /* white/light gray text */
            --text-reason: #ff2a5f; /* bright red/pink color */
            --text-support: #94a3b8;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            /* Clean, modern system fonts */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .container {
            padding: 2rem;
            max-width: 800px;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Large warning icon with subtle pulse animation */
        .warning-icon {
            font-size: 80px;
            margin-bottom: 1.5rem;
            animation: pulse 2s infinite ease-in-out;
            display: inline-block;
            line-height: 1;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.9; filter: drop-shadow(0 0 10px rgba(255, 204, 0, 0.2)); }
            50% { transform: scale(1.08); opacity: 1; filter: drop-shadow(0 0 25px rgba(255, 204, 0, 0.6)); }
            100% { transform: scale(1); opacity: 0.9; filter: drop-shadow(0 0 10px rgba(255, 204, 0, 0.2)); }
        }

        /* Main heading: 48px */
        h1 {
            font-size: 48px;
            margin: 0 0 0.5rem 0;
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: -1px;
        }

        /* Reason text: 22px */
        .reason {
            font-size: 22px;
            color: var(--text-reason);
            font-weight: 600;
            margin: 0 0 1.5rem 0;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 10px rgba(255, 42, 95, 0.2);
        }

        /* Supporting text */
        .support {
            font-size: 18px;
            color: var(--text-support);
            margin: 0;
            line-height: 1.5;
            max-width: 500px;
        }

        .footer {
            position: absolute;
            bottom: 2rem;
            font-size: 14px;
            color: var(--text-support);
            opacity: 0.6;
            letter-spacing: 0.5px;
        }

        /* Fully responsive for mobile */
        @media (max-width: 600px) {
            h1 { font-size: 32px; }
            .reason { font-size: 18px; }
            .support { font-size: 16px; }
            .warning-icon { font-size: 64px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="warning-icon">⚠️</div>
        <h1>Website Temporarily Down</h1>
        <p class="reason">Efforts are not Valued !!</p>
        <p class="support">We're working on improvements. Please check back soon.</p>
    </div>
    
    <div class="footer">
        Current IST Time: <span id="ist-time">Loading...</span>
    </div>

    <script>
        function updateTime() {
            const timeElement = document.getElementById('ist-time');
            const now = new Date();
            
            // Format for IST (Indian Standard Time)
            const options = {
                timeZone: 'Asia/Kolkata',
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                hour12: true
            };
            
            const istTime = new Intl.DateTimeFormat('en-IN', options).format(now);
            timeElement.textContent = istTime;
        }
        
        // Initial call
        updateTime();
        
        // Update every second to ensure the minute rolls over immediately when it changes
        setInterval(updateTime, 1000); 
    </script>
</body>
</html>
